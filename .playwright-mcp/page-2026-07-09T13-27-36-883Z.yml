        - generic [ref=e150]:
          - paragraph [ref=e151]: "I'm a full-stack developer who plans and orchestrates: clean design, fluid interfaces, and software that does what the client actually asked for. I start by getting concrete with people about what they want, then I architect it and build toward that, not around it."
          - paragraph [ref=e152]: "I learned the craft by hand. My first years were straight programming, things like a color picker and a text-based minigame I wrote from scratch in Python. Projects I'm still fond of, because they're where the fundamentals stuck. Over my later years AI became a core part of how I work, and because I know what's underneath, I use it as an architect rather than a crutch: I understand the system first, then orchestrate the build."
          - paragraph [ref=e153]: "I'm a perfectionist by nature. That shows up most in the design and in the value I deliver: I don't ship something that feels half-considered."
          - paragraph [ref=e154]: From September 2026 I start the 4-year HBO-ICT Cyber Security & Cloud duaal at Hogeschool Utrecht while working at H2B IT Solutions, on the operations side. The goal is to be the developer who ships and understands what happens after deploy. Growing toward Linux, Cloud Security, DevSecOps and GRC.
          - paragraph [ref=e155]: "Three languages: Dutch (native), English (fluent), Serbo-Croatian (conversational)."
